<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/shaka-player@4/dist/controls.css">
  <script src="https://cdn.jsdelivr.net/npm/shaka-player@4/dist/shaka-player.ui.js">
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #uiContainer {
      width: 100vw; height: 100vh;
      position: relative;
    }
    #uiContainer video {
      width: 100%; height: 100%;
      object-fit: contain;
    }

    .error-overlay {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: rgba(0,0,0,0.85);
      color: #fff; font-family: sans-serif;
      gap: 1rem;
    }
    .error-overlay h2 { color: #e50914; margin: 0; }
    .error-overlay p { color: #aaa; margin: 0; }
    .error-overlay button {
      padding: 0.75rem 1.5rem; font-size: 1rem;
      background: #e50914; color: #fff; border: none;
      border-radius: 4px; cursor: pointer;
    }
    .error-overlay button:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div id="errorOverlay" class="error-overlay" style="display:none;">
    <h2>Stream non disponibile</h2>
    <p id="errorMsg">Il caricamento dello stream ha fallito.</p>
    <button id="fallbackBtn">Riprova con player originale</button>
  </div>
  <div id="uiContainer">
    <video id="video" autoplay playsinline></video>
  </div>
  <script>
    (function() {
      var video = document.getElementById('video');
      var uiContainer = document.getElementById('uiContainer');
      var errorOverlay = document.getElementById('errorOverlay');
      var errorMsg = document.getElementById('errorMsg');
      var player = null;
      var ui = null;

      function showError(msg) {
        console.error('[VixFlixPlayer]', msg);
        errorMsg.textContent = msg;
        errorOverlay.style.display = 'flex';
        sendEvent('error', { message: msg });
      }

      function log(msg) {
        console.log('[VixFlixPlayer]', msg);
      }

      function sendEvent(eventName, extra) {
        parent.postMessage({
          type: 'PLAYER_EVENT',
          data: Object.assign({ event: eventName }, extra || {})
        }, '*');
      }

      log('Player page loaded');

      // Fallback button
      document.getElementById('fallbackBtn').addEventListener('click', function() {
        parent.location.href = '{{FALLBACK_URL}}';
      });

      if (typeof shaka === 'undefined') {
        showError('Shaka Player library not loaded from CDN');
        return;
      }
      log('Shaka Player library loaded');

      shaka.polyfill.installAll();

      if (!shaka.Player.isBrowserSupported()) {
        showError('Browser non supportato da Shaka Player');
        return;
      }
      log('Browser supported');

      try {
        // Usa costruttore con video element (funzionava senza UI)
        player = new shaka.Player(video);
        log('Shaka Player instance created');

        // Safari/iOS: usa native HLS per evitare LOAD_INTERRUPTED (error 1001)
        var isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
        var isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
        if (isSafari || isIOS) {
          log('Safari/iOS detected, enable native HLS fallback');
          player.configure({
            streaming: { preferNativeHls: true }
          });
        }
      } catch (e) {
        showError('Shaka Player instantiation failed: ' + e.message);
        return;
      }

      // Install UI overlay (controlli, selettore qualita, audio)
      try {
        ui = new shaka.ui.Overlay(player, uiContainer, video);
        log('Shaka UI Overlay created');
      } catch (e) {
        log('Shaka UI Overlay fallito, uso player base: ' + e.message);
      }

      player.addEventListener('error', function(e) {
        var detail = e.detail;
        var msg = 'Shaka error: ' + (detail ? detail.message || detail.type || JSON.stringify(detail) : 'unknown');
        log(msg);
        if (detail && detail.severity) log('Severity: ' + detail.severity);
        if (detail && detail.category) log('Category: ' + detail.category);
        showError(msg);
      });

      var m3u8Url = '{{M3U8_URL}}';
      log('M3U8 URL: ' + m3u8Url);

      if (!m3u8Url || m3u8Url === '') {
        showError('URL stream non disponibile (placeholder non sostituito)');
        return;
      }

      log('Avvio caricamento stream...');
      player.load(m3u8Url).then(function() {
        log('Stream caricato, avvio riproduzione');
        video.play().then(function() {
          log('Riproduzione avviata');
        }).catch(function(e) {
          log('video.play() fallito: ' + e.message);
        });
      }).catch(function(e) {
        log('player.load() fallito');
        log('Error name: ' + e.name);
        log('Error message: ' + e.message);
        if (e.code) log('Error code: ' + e.code);
        if (e.data) log('Error data: ' + JSON.stringify(e.data));
        showError('Caricamento stream fallito: ' + (e.message || e.code || 'errore sconosciuto'));
      });

      // Timeupdate ogni 5 secondi
      setInterval(function() {
        if (player && !video.paused) {
          sendEvent('timeupdate', { currentTime: video.currentTime });
        }
      }, 5000);

      video.addEventListener('ended', function() {
        log('Video ended');
        sendEvent('ended');
      });
    })();
  </script>
</body>
</html>
